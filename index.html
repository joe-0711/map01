<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>野球選手出身地マップ</title>
  <link href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght=400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #e8c45a;
      --accent2: #3a9bd5;
      --text: #f0f0f0;
      --text-muted: #8a8fa8;
      --border: #2e334d;
      --sidebar-w: 360px;
    }
 
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }
 
    /* ── MAP ── */
    #map-wrap {
      flex: 1;
      position: relative;
      transition: margin-right 0.4s cubic-bezier(.4,0,.2,1);
    }
    #map { width: 100%; height: 100%; }
 
    /* ── JUMP PANEL ── */
    #jump-panel {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 10;
      background: rgba(26,29,39,0.92);
      backdrop-filter: blur(8px);
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 200px;
      max-height: 85vh;
    }
    #jump-panel .panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    /* ── FILTER & SORT UI ── */
    .controls-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 6px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .panel-select {
      width: 100%;
      padding: 6px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      cursor: pointer;
    }
    .panel-select:focus {
      border-color: var(--accent2);
    }
    .sort-btn {
      width: 100%;
      padding: 6px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .sort-btn.active {
      background: var(--surface2);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* ボタンコンテナ (スクロール対応) */
    #button-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      max-height: 50vh;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #button-container button {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      text-align: left;
      transition: background .15s, border-color .15s;
      flex-shrink: 0;
    }
    #button-container button:hover,
    #button-container button.active {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--accent);
    }
 
    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(.4,0,.2,1);
      position: relative;
      z-index: 20;
      overflow: hidden;
    }
    #sidebar.open {
      transform: translateX(0);
    }
 
    /* close btn */
    #sidebar-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .15s, border-color .15s;
      z-index: 5;
    }
    #sidebar-close:hover { color: var(--text); border-color: var(--text); }
 
    /* header area */
    .sb-header {
      position: relative;
      flex-shrink: 0;
    }
    .sb-images {
      display: flex;
      height: 180px;
      overflow: hidden;
    }
    .sb-images img {
      flex: 1;
      object-fit: cover;
      object-position: top center;
      filter: brightness(.85);
      transition: flex .3s;
    }
    .sb-images img:hover { flex: 2; }
 
    .sb-img-placeholder {
      flex: 1;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 12px;
    }
 
    .sb-name-block {
      padding: 16px 20px 10px;
      border-bottom: 1px solid var(--border);
    }
    .sb-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: .15em;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .sb-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .sb-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }
 
    /* content */
    .sb-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
 
    .sb-section {
      margin-bottom: 20px;
    }
    .sb-section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sb-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
 
    .sb-bio {
      font-size: 12px;
      line-height: 1.75;
      color: #ccc;
    }
 
    /* ── VIDEO PLAYER CONTAINER ── */
    .sb-video-container {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
      background: #000;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .sb-video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
 
    /* stats grid (key facts) */
    .sb-facts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .fact-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .fact-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .fact-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .fact-value.highlight { color: var(--accent); }
 
    /* season table */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .stats-table th {
      background: var(--surface2);
      color: var(--text-muted);
      font-weight: 600;
      text-align: center;
      padding: 6px 4px;
      border-bottom: 1px solid var(--border);
      letter-spacing: .05em;
      position: sticky;
      top: 0;
    }
    .stats-table th:first-child { text-align: left; padding-left: 8px; }
    .stats-table td {
      text-align: center;
      padding: 5px 4px;
      border-bottom: 1px solid rgba(46,51,77,.5);
      color: #ccc;
    }
    .stats-table td:first-child { text-align: left; padding-left: 8px; color: var(--text-muted); }
    .stats-table tr:hover td { background: rgba(255,255,255,.03); }
    .stats-table .best { color: var(--accent); font-weight: 700; }
 
    /* marker */
    .custom-marker {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .custom-marker:hover, .custom-marker.active {
      transform: scale(1.2);
      box-shadow: 0 4px 14px rgba(232,196,90,.5);
    }
  </style>
</head>

// ── MAP INITIALIZATION ──
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  center: [138.5, 36.5],
  zoom: 5.5
});
map.addControl(new maplibregl.NavigationControl());

// マーカー要素をスクリプト側で管理するためのオブジェクト
const markerElements = {};

map.on('load', () => {
  // マーカーを生成して配置（ここは初回のみ実行）
  locations.forEach(loc => {
    const el = document.createElement('div');
    el.className = 'custom-marker';
    el.style.background = loc.color;
    el.textContent = loc.icon;
   
    new maplibregl.Marker({ element: el })
      .setLngLat([loc.lng, loc.lat])
      .addTo(map);

    // マーカークリックで連動
    el.addEventListener('click', () => {
      map.flyTo({ center: [loc.lng, loc.lat], zoom: loc.zoom, duration: 1500 });
      // 対応するリストのボタンを探してアクティブ化
      const targetBtn = document.querySelector(`button[data-id="${loc.id}"]`);
      openSidebar(loc, targetBtn, el);
    });

    // 後からアクセスできるように保存
    markerElements[loc.id] = el;
  });

  // 初回リスト描画
  renderButtons();
});

// ── SIDEBAR LOGIC ──
const sidebar = document.getElementById('sidebar');
const sbImages = document.getElementById('sb-images');
const sbNumber = document.getElementById('sb-number');
const sbName   = document.getElementById('sb-name');
const sbSub    = document.getElementById('sb-sub');
const sbFacts  = document.getElementById('sb-facts');
const sbBio    = document.getElementById('sb-bio');
const sbTable  = document.getElementById('sb-table-wrap');
const sbVideoContainer = document.getElementById('sb-video-container');
const sbVideoSection = document.getElementById('sb-video-section');
 
let activeBtn = null;
let activeMarkerEl = null;
 
function openSidebar(loc, btn, markerEl) {
  sbImages.innerHTML = '';
  const imgs = loc.image || [];
  if (imgs.length) {
    imgs.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = loc.name;
      img.onerror = () => img.outerHTML = '<div class="sb-img-placeholder">画像なし</div>';
      sbImages.appendChild(img);
    });
  } else {
    sbImages.innerHTML = '<div class="sb-img-placeholder">画像なし</div>';
  }
 
  sbNumber.textContent = loc.number || '';
  sbName.textContent   = loc.name;
  sbSub.textContent    = loc.sub || '';
 
  if (loc.youtubeId) {
    sbVideoSection.style.display = 'block';
    sbVideoContainer.innerHTML = `
      <iframe
        src="https://www.youtube-nocookie.com/embed/${loc.youtubeId}?rel=0&showinfo=0"
        title="${loc.name} ハイライト"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>`;
  } else {
    sbVideoSection.style.display = 'none';
    sbVideoContainer.innerHTML = '';
  }

  sbFacts.innerHTML = (loc.facts || []).map(f => `
    <div class="fact-card">
      <div class="fact-label">${f.label}</div>
      <div class="fact-value${f.highlight ? ' highlight' : ''}">${f.value}</div>
    </div>
  `).join('');
 
  sbBio.textContent = loc.bio || '';
 
  if (loc.tableHeaders && loc.tableRows) {
    const thead = `<tr>${loc.tableHeaders.map(h => `<th>${h}</th>`).join('')}</tr>`;
    const tbody = loc.tableRows.map((row, i) =>
      `<tr>${row.map((cell, j) => {
        const isBest = i === loc.bestRow;
        return `<td class="${isBest && j > 0 ? 'best' : ''}">${cell}</td>`;
      }).join('')}</tr>`
    ).join('');
    sbTable.innerHTML = `<table class="stats-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  } else {
    sbTable.innerHTML = '';
  }
 
  sidebar.classList.add('open');
 
  if (activeBtn) activeBtn.classList.remove('active');
  activeBtn = btn;
  if (btn) btn.classList.add('active');
 
  if (activeMarkerEl) activeMarkerEl.classList.remove('active');
  activeMarkerEl = markerEl;
  if (markerEl) markerEl.classList.add('active');
}
 
document.getElementById('sidebar-close').addEventListener('click', () => {
  sidebar.classList.remove('open');
  sbVideoContainer.innerHTML = '';
  if (activeBtn) activeBtn.classList.remove('active');
  if (activeMarkerEl) activeMarkerEl.classList.remove('active');
  activeBtn = null;
  activeMarkerEl = null;
});

// ── FILTER & SORT LOGIC ──
const buttonContainer = document.getElementById('button-container');
const filterTeamSelect = document.getElementById('filter-team');
const sortToggleBtn = document.getElementById('sort-toggle');

let isSortedByKana = false; // 現在五十音順かどうか

// ボタン群を動的に再描画する関数
function renderButtons() {
  // 現在のフィルター値を取得
  const selectedTeam = filterTeamSelect.value;
  
  // 1. フィルタリング
  let filteredData = locations.filter(loc => {
    return selectedTeam === 'all' || loc.team === selectedTeam;
  });

  // 2. 並び替え
  if (isSortedByKana) {
    // 五十音順 (kanaプロパティで比較)
    filteredData.sort((a, b) => a.kana.localeCompare(b.kana, 'ja'));
  } else {
    // デフォルト順 (配列の元の位置を維持するためにIDで元のインデックスを探す)
    filteredData.sort((a, b) => {
      return locations.findIndex(x => x.id === a.id) - locations.findIndex(x => x.id === b.id);
    });
  }

  // 3. HTMLへの反映
  buttonContainer.innerHTML = '';
  
  if (filteredData.length === 0) {
    const emptyMsg = document.createElement('div');
    emptyMsg.style.cssText = 'font-size: 11px; color: var(--text-muted); text-align: center; padding: 10px;';
    emptyMsg.textContent = '該当する選手がいません';
    buttonContainer.appendChild(emptyMsg);
    return;
  }

  filteredData.forEach(loc => {
    const btn = document.createElement('button');
    btn.textContent = `${loc.icon} ${loc.name}`;
    btn.setAttribute('data-id', loc.id); // 参照用IDを付与

    // サイドバーが既に開いていて、現在表示中の選手であればアクティブ状態にする
    if (activeBtn && activeBtn.getAttribute('data-id') === loc.id) {
      btn.className = 'active';
      activeBtn = btn; // 新しいボタン要素に参照を更新
    }

    // クリックイベント
    btn.addEventListener('click', () => {
      map.flyTo({ center: [loc.lng, loc.lat], zoom: loc.zoom, duration: 1500 });
      openSidebar(loc, btn, markerElements[loc.id]);
    });

    buttonContainer.appendChild(btn);
  });
}

// 球団フィルターが変更された時
filterTeamSelect.addEventListener('change', renderButtons);

// 並び替えボタンがクリックされた時
sortToggleBtn.addEventListener('click', () => {
  isSortedByKana = !isSortedByKana;
  if (isSortedByKana) {
    sortToggleBtn.textContent = 'デフォルト順に戻す';
    sortToggleBtn.classList.add('active');
  } else {
    sortToggleBtn.textContent = '五十音順に並び替え';
    sortToggleBtn.classList.remove('active');
  }
  renderButtons();
});
 </script>
